name: 플러터 모듈 배포

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:

env:
  ENGINE_RELEASE_TITLE: local-engine
  ENGINE_SRC_PATH: ${{ github.workspace }}/engine/src

jobs:
  release-ios-module:
    name: iOS 모듈 배포
    runs-on: macos-26
    timeout-minutes: 60
    env:  
      LOCAL_ENGINE_TARGET: ios_release
      LOCAL_ENGINE_HOST_TARGET: host_release_arm64
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v5

      - name: Flutter SDK 설치
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.4
          cache: true

      - name: iOS 로컬 엔진 다운로드
        run: |
          mkdir -p ${{ env.ENGINE_SRC_PATH }}/out

          gh release download \
            "${{ env.ENGINE_RELEASE_TITLE }}" \
            --pattern "${{ env.LOCAL_ENGINE_TARGET }}.zip" \
            --dir /tmp/engine-ios

          unzip -q /tmp/engine-ios/${{ env.LOCAL_ENGINE_TARGET }}.zip \
            -d ${{ env.ENGINE_SRC_PATH }}/out/

          gh release download \
            "${{ env.ENGINE_RELEASE_TITLE }}" \
            --pattern "${{ env.LOCAL_ENGINE_HOST_TARGET }}.zip" \
            --dir /tmp/engine-host

          unzip -q /tmp/engine-host/${{ env.LOCAL_ENGINE_HOST_TARGET }}.zip \
            -d ${{ env.ENGINE_SRC_PATH }}/out/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 엔진 경로 확인
        run: |
          echo "=== iOS 엔진 타깃 ==="
          ls ${{ env.ENGINE_SRC_PATH }}/out/${{ env.LOCAL_ENGINE_TARGET }}/
          echo "=== Host 엔진 타깃 ==="
          ls ${{ env.ENGINE_SRC_PATH }}/out/${{ env.LOCAL_ENGINE_HOST_TARGET }}/

      - name: iOS Swift Package 빌드
        run: |
          bash build_module_ios.sh
          cd ./dist/ios
          zip -r FlutterModule.zip FlutterModule
        env:
          LOCAL_ENGINE_SRC_PATH: ${{ env.ENGINE_SRC_PATH }}
          LOCAL_ENGINE: ${{ env.LOCAL_ENGINE_TARGET }}
          LOCAL_ENGINE_HOST: ${{ env.LOCAL_ENGINE_HOST_TARGET }}

      - name: FlutterModule.zip 파일 업로드
        run: |
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "iOS 플러터 모듈입니다." --latest
          gh release upload ${{ github.ref_name }} ./dist/ios/FlutterModule.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-android-module:
    name: Android 모듈 배포
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LOCAL_ENGINE_TARGET: android_release_arm64
      LOCAL_ENGINE_HOST_TARGET: host_release
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v5

      - name: Flutter SDK 설치
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.4
          cache: true

      - name: Java 설치
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: corretto

      - name: Android 로컬 엔진 다운로드
        run: |
          mkdir -p ${{ env.ENGINE_SRC_PATH }}/out

          gh release download \
            "${{ env.ENGINE_RELEASE_TITLE }}" \
            --pattern "${{ env.LOCAL_ENGINE_TARGET }}.zip" \
            --dir /tmp/engine-android

          unzip -q /tmp/engine-android/${{ env.LOCAL_ENGINE_TARGET }}.zip \
            -d ${{ env.ENGINE_SRC_PATH }}/out/

          gh release download \
            "${{ env.ENGINE_RELEASE_TITLE }}" \
            --pattern "${{ env.LOCAL_ENGINE_HOST_TARGET }}.zip" \
            --dir /tmp/engine-host

          unzip -q /tmp/engine-host/${{ env.LOCAL_ENGINE_HOST_TARGET }}.zip \
            -d ${{ env.ENGINE_SRC_PATH }}/out/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 엔진 경로 확인
        run: |
          echo "=== Android 엔진 타깃 ==="
          ls ${{ env.ENGINE_SRC_PATH }}/out/${{ env.LOCAL_ENGINE_TARGET }}/
          echo "=== Host 엔진 타깃 ==="
          ls ${{ env.ENGINE_SRC_PATH }}/out/${{ env.LOCAL_ENGINE_HOST_TARGET }}/

      - name: Android Maven 라이브러리 빌드 및 배포
        run: |
          bash deploy_module_android.sh ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCAL_ENGINE_SRC_PATH: ${{ env.ENGINE_SRC_PATH }}
          LOCAL_ENGINE: ${{ env.LOCAL_ENGINE_TARGET }}
          LOCAL_ENGINE_HOST: ${{ env.LOCAL_ENGINE_HOST_TARGET }}
